meta:
  title: "Suggest a Purchase ...And More!"
  subtitle: "A new in-house capability — demonstrated by Suggest-a-Purchase"
  description: "Suggest a Purchase ...And More! — a new in-house capability at CHPL, demonstrated by Suggest-a-Purchase — CHPL Senior Leadership, 2026-05-29"
  keywords: "Ray Voelker, Cincinnati & Hamilton County Public Library, agentic coding, Suggest-a-Purchase, Sierra, Datasette, Open Library"
  author: "Ray Voelker"
  institution: "Cincinnati &amp; Hamilton County Public Library"
  email: "ray.voelker@chpl.org"
  filename: "suggest-a-purchase.html"

slides:

  # =============================================
  # 1. TITLE
  # =============================================
  - type: title
    title: "Suggest a Purchase ...And More!"
    title_style: "font-size: 1.4em;"
    subtitle: "A new in-house capability — demonstrated by Suggest-a-Purchase"

  # =============================================
  # 2. THE OPPORTUNITY
  # =============================================
  - type: content
    title: "The opportunity"
    bullets:
      - "A whole class of software is specific to <em>how CHPL works</em> &mdash; our workflows, our systems, our customers."
      - "Too specific for an outside product to build for us; too big a lift for our in-house capacity to take on."
      - '<span class="accent">That math just changed.</span> Agentic coding makes production-quality, CHPL-specific software practical for one staff person to build &mdash; fast.'
    notes: |
      This is the whole "why leadership should care" setup — no vendor naming.
      That math just changed. PAUSE here — this is the strategic spine.
      The rest of the talk makes it concrete. (~1 min)

  # =============================================
  # 3. WHAT I BUILT
  # =============================================
  - type: content
    title: "Suggest-a-Purchase"
    subtitle: "A customer recommends something for the collection."
    image:
      src: "../diagrams/architecture-slide3.png"
      alt: "Patron to web app to bot to staff flow"
      style: "max-height: 46vh;"
    footer_text: 'Built entirely on tools CHPL already owns &mdash; Sierra, existing servers, public APIs.'
    notes: |
      Architecture in one sentence: a customer logs in with their library card,
      submits a request, an automated "suggest-a-bot" enriches it from Sierra
      and Open Library, and staff review through a Datasette table they know.
      Transition: "Easier to show you than to describe — let me bring it up." (~1 min)

  # =============================================
  # 4. LIVE DEMO  (parent interstitial + 5 vertical deep-dive subslides)
  # =============================================
  - type: content
    background: "#0C2340"
    title: "Live demo"
    subtitle: "The live app &mdash; &darr; to walk the flow if needed."
    footer_text: 'Live app &middot; 2-minute recording embedded as the safety net'
    notes: |
      LIVE DEMO — not narration. Beats (protect 4–5 min):
      A — Customer login + submit live (0:45). B — My Requests, seeded rows (0:30).
      C — Staff Datasette view: Yellowface, TheWomen, Amazon URL (2:00). D — Status + audit (0:45).
      If long: drop beat D first, then truncate C. Safety net: the 2-min recording.
      The ↓ subslides are the screenshot fallback if the live app won't cooperate.
    subslides:
      - title: "Sign in"
        image:
          src: "../screenshots/01-patron-login.png"
          alt: "Customer login with library card"
          style: "max-height: 38vh;"
        subtitle: "library card login"
      - title: "Suggest"
        image:
          src: "../screenshots/02-patron-submit.png"
          alt: "Submit a purchase suggestion"
          style: "max-height: 38vh;"
        subtitle: "plain-language request — no forms"
      - title: "Track"
        image:
          src: "../screenshots/03-patron-my-requests.png"
          alt: "My Requests with status"
          style: "max-height: 38vh;"
        subtitle: "your suggestions + status"
      - title: "Staff review"
        image:
          src: "../screenshots/04-staff-table.png"
          alt: "Bot-enriched staff queue in Datasette"
          style: "max-height: 38vh;"
        subtitle: "a bot-enriched queue in Datasette"
      - title: "Auto-enriched"
        image:
          src: "../screenshots/05-staff-detail.png"
          alt: "Request enriched from Open Library"
          style: "max-height: 38vh;"
        subtitle: "matched &amp; enriched from Open Library"

  # =============================================
  # 5. HOW IT GOT BUILT
  # =============================================
  - type: content
    title: "How it got built"
    subtitle: "Built in-house, in weeks &mdash; and built to last:"
    bullets:
      - "Open-source, non-proprietary tools &mdash; no vendor lock-in."
      - "Fully documented &mdash; design-doc first."
      - 'Rigorously tested &mdash; <span class="accent">340 automated tests.</span>'
      - "Built to be picked up and extended by whoever comes next."
    footer_text: '<strong>The capability is the story &mdash; not just this one app.</strong>'
    notes: |
      Say the number out loud: 340 automated tests. Design-doc first, built incrementally.
      Meta-point: produced in-house, in weeks, by someone who already understands
      CHPL's workflows. That capacity is the thing worth talking about. (~1 min)

  # =============================================
  # 6. IT COMPOUNDS  (concept-first: customer control / less friction)
  # =============================================
  - type: content
    title: "The capability compounds"
    subtitle: "The real goal: less friction between a customer and the item they want."
    bullets:
      - "Suggest-a-Purchase: we don&rsquo;t own it &rarr; the customer asks &rarr; we can act."
      - "The same tool <em>could</em> surface more &mdash; e.g. subscribe to a favorite author, and a match becomes a one-click hold."
      - '<span class="accent">Never auto-placed &mdash; the customer stays in control.</span>'
    footer_text: 'Same Sierra integration. Same Datasette pattern. Same audit trail.'
    notes: |
      The core idea is reducing friction between a customer and the item they want.
      Suggest-a-Purchase is the proven instance. The author-subscription idea is ONE
      possible direction — mention it lightly, it's politically sensitive. Do NOT
      over-commit. We never auto-place — the customer stays in control. (~1 min)

  # =============================================
  # 7. WHERE THIS GOES NEXT  (SaP + MSA dog-fooding)
  # =============================================
  - type: content
    title: "Where this goes next"
    bullets:
      - "Partner with <strong>MSA (Materials Selection &amp; Acquisition)</strong> to dog-food it internally first."
      - "Smooth the workflow, work out the bugs &mdash; <em>then</em> put it in front of customers."
      - "Reusable patterns &mdash; each next tool of this shape goes faster."
    footer_text: 'The capability compounds. That&rsquo;s the story.'
    notes: |
      Dog-food it with MSA first — smooth the workflow internally, then customers.
      End on the capability note — no ask. (~1 min)

  # =============================================
  # 8. RESOURCES  (parent + deep-dive subslide)
  # =============================================
  - type: content
    title: "Resources"
    subtitle: "Built with &mdash; open tools, public data:"
    links_list:
      - text: "Datasette — datasette.io"
        url: "https://datasette.io"
      - text: "Open Library API — openlibrary.org/developers/api"
        url: "https://openlibrary.org/developers/api"
      - text: "Claude Code — claude.com/claude-code"
        url: "https://claude.com/claude-code"
      - text: "Sierra REST API — techdocs.iii.com/sierraapi"
        url: "https://techdocs.iii.com/sierraapi/"
    footer_text: '&darr; data sources &amp; directions explored'
    notes: |
      The stack is all open / already-owned. ↓ for the data sources and
      consortial-borrowing directions this work touched or could touch.
    subslides:
      - title: "Data &amp; directions explored"
        bullets:
          - '<a href="https://www.wikidata.org/" target="_top">Wikidata</a> &mdash; open structured data for enrichment'
          - '<a href="https://searchohio.org/" target="_top">SearchOhio</a> &mdash; statewide public-library borrowing'
          - '<a href="https://www.ohiolink.edu/" target="_top">OhioLINK</a> &mdash; statewide academic-library borrowing'
          - '<a href="https://chpl.org/services/searchohio-ohiolink/" target="_top">CHPL: SearchOhio / OhioLINK</a>'
        notes: |
          These are directions the capability could reach — enrichment (Wikidata,
          Open Library) and consortial borrowing (SearchOhio / OhioLINK). Mention
          only if asked; keep it light.

  # =============================================
  # 9. APPENDIX (Q&A backup)
  # =============================================
  - type: content
    title: "Appendix"
    subtitle: "Q&amp;A backup &mdash; &darr; for screenshots."
    image:
      src: "../diagrams/architecture-slide8-appendix.png"
      alt: "Full architecture"
      style: "max-height: 46vh;"
    footer_text: 'Full architecture &middot; &darr; My Requests &middot; staff queue &middot; enrichment'
    notes: |
      Backup only — pull up on demand. Q&A: BiblioCommons (brief, respectful, only if asked);
      PII (patron_record_id only, no email/barcode, rate-limited, audit trail);
      succession (open-source deps, 340 tests, design-docs-first); time-spent (have a real number).
    subslides:
      - title: "My Requests"
        subtitle: "what the customer sees after submitting"
        image:
          src: "../screenshots/03-patron-my-requests.png"
          alt: "Customer — My Requests"
          style: "max-height: 38vh;"
      - title: "Staff queue"
        subtitle: "completed &amp; bot-enriched, in Datasette"
        image:
          src: "../screenshots/04-staff-table.png"
          alt: "Staff — completed queue"
          style: "max-height: 38vh;"
      - title: "Open Library enrichment"
        subtitle: "matched edition + metadata (JSON)"
        image:
          src: "../screenshots/05-staff-detail.png"
          alt: "Open Library enrichment detail"
          style: "max-height: 34vh;"

  # =============================================
  # 10. CLOSING
  # =============================================
  - type: closing
    title: "Thank you"
    body: |
      Questions, ideas, or CHPL-specific tools you'd want built next?
