<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#546e7a"/>
    </marker>
  </defs>
  <rect width="1120" height="620" fill="#ffffff"/>
  <text x="40" y="38" font-size="20" font-weight="700" fill="#16384a">Suggest-a-Purchase &#8212; architecture</text>
  <text x="40" y="60" font-size="13" fill="#78909c">Appendix detail. Everything runs on CHPL-owned infrastructure; the only external call is the public Open Library API.</text>

  <!-- People -->
  <rect x="40" y="86" width="170" height="68" rx="12" fill="#eceff1" stroke="#78909c" stroke-width="1.5"/>
  <text x="125" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#37474f">Patron</text>
  <text x="125" y="138" text-anchor="middle" font-size="12" fill="#607d8b">browser</text>

  <rect x="40" y="432" width="170" height="68" rx="12" fill="#eceff1" stroke="#78909c" stroke-width="1.5"/>
  <text x="125" y="464" text-anchor="middle" font-size="17" font-weight="700" fill="#37474f">Staff</text>
  <text x="125" y="484" text-anchor="middle" font-size="12" fill="#607d8b">browser</text>

  <!-- Web app -->
  <rect x="300" y="84" width="250" height="96" rx="12" fill="#2c6e8f" stroke="#1f5266" stroke-width="1.5"/>
  <text x="425" y="118" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Suggest-a-Purchase web app</text>
  <text x="425" y="139" text-anchor="middle" font-size="12.5" fill="#cfe3ee">Datasette + plugin</text>
  <text x="425" y="160" text-anchor="middle" font-size="12.5" fill="#cfe3ee">login · submit · my-requests · staff table</text>

  <!-- Bot -->
  <rect x="300" y="300" width="250" height="96" rx="12" fill="#e8f0f6" stroke="#2c6e8f" stroke-width="1.5"/>
  <text x="425" y="334" text-anchor="middle" font-size="17" font-weight="700" fill="#16384a">suggest-a-bot</text>
  <text x="425" y="355" text-anchor="middle" font-size="12.5" fill="#4a7990">scheduled — processes pending</text>
  <text x="425" y="375" text-anchor="middle" font-size="12.5" fill="#4a7990">catalog lookup + enrichment</text>

  <!-- Store -->
  <rect x="300" y="470" width="250" height="80" rx="12" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="425" y="502" text-anchor="middle" font-size="16" font-weight="700" fill="#424242">SQLite</text>
  <text x="425" y="523" text-anchor="middle" font-size="12" fill="#616161">purchase_requests</text>
  <text x="425" y="540" text-anchor="middle" font-size="12" fill="#616161">request_events (audit trail)</text>

  <!-- Sierra -->
  <rect x="660" y="108" width="200" height="78" rx="12" fill="#e8f0f6" stroke="#2c6e8f" stroke-width="1.5"/>
  <text x="760" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#16384a">Sierra — CHPL ILS</text>
  <text x="760" y="162" text-anchor="middle" font-size="12" fill="#4a7990">patron auth · catalog &amp; holdings</text>

  <!-- Open Library -->
  <rect x="660" y="300" width="200" height="78" rx="12" fill="#e6f4ea" stroke="#2e7d4f" stroke-width="1.5"/>
  <text x="760" y="332" text-anchor="middle" font-size="16" font-weight="700" fill="#1b4d2e">Open Library</text>
  <text x="760" y="354" text-anchor="middle" font-size="12" fill="#2e7d4f">public metadata API</text>

  <!-- Planned cluster -->
  <rect x="640" y="430" width="240" height="120" rx="12" fill="#fafafa" stroke="#bdbdbd" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="760" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#9e9e9e">Planned (built-in, off today)</text>
  <text x="760" y="486" text-anchor="middle" font-size="12.5" fill="#9e9e9e">Consortium availability check</text>
  <text x="760" y="512" text-anchor="middle" font-size="12.5" fill="#9e9e9e">LLM input refinement</text>
  <text x="760" y="530" text-anchor="middle" font-size="12.5" fill="#9e9e9e">&amp; staff-facing assessment</text>

  <!-- arrows -->
  <!-- patron -> web app -->
  <line x1="210" y1="116" x2="298" y2="116" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="254" y="106" text-anchor="middle" font-size="11.5" fill="#546e7a">log in · submit</text>

  <!-- staff -> web app (routed riser) -->
  <polyline points="210,466 250,466 250,150 298,150" fill="none" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="290" text-anchor="middle" font-size="11.5" fill="#546e7a" transform="rotate(-90 250 290)">review · update status</text>

  <!-- web app -> sierra -->
  <line x1="550" y1="120" x2="658" y2="138" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="600" y="110" text-anchor="middle" font-size="11.5" fill="#546e7a">patron auth</text>

  <!-- web app <-> store (left riser) -->
  <polyline points="350,180 276,180 276,498 298,498" fill="none" stroke="#546e7a" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="276" y="335" text-anchor="middle" font-size="11.5" fill="#546e7a" transform="rotate(-90 276 335)">store · read requests</text>

  <!-- bot <-> store -->
  <line x1="425" y1="396" x2="425" y2="468" stroke="#546e7a" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="436" y="436" text-anchor="start" font-size="11" fill="#546e7a">read pending</text>
  <text x="436" y="450" text-anchor="start" font-size="11" fill="#546e7a">write enrichment + audit</text>

  <!-- bot -> sierra -->
  <line x1="550" y1="322" x2="690" y2="188" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="640" y="252" text-anchor="middle" font-size="11.5" fill="#546e7a" transform="rotate(-44 640 252)">catalog &amp; holdings</text>

  <!-- bot -> open library -->
  <line x1="550" y1="344" x2="658" y2="338" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="604" y="332" text-anchor="middle" font-size="11.5" fill="#546e7a">metadata</text>

  <!-- bot -> planned (dashed) -->
  <line x1="545" y1="372" x2="638" y2="452" stroke="#bdbdbd" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arr)"/>

  <!-- legend -->
  <rect x="40" y="528" width="20" height="14" rx="3" fill="#e8f0f6" stroke="#2c6e8f" stroke-width="1.3"/>
  <text x="68" y="540" font-size="12" fill="#546e7a">CHPL-owned</text>
  <rect x="40" y="550" width="20" height="14" rx="3" fill="#e6f4ea" stroke="#2e7d4f" stroke-width="1.3"/>
  <text x="68" y="562" font-size="12" fill="#546e7a">Public API</text>
  <rect x="170" y="550" width="20" height="14" rx="3" fill="#fafafa" stroke="#bdbdbd" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="198" y="562" font-size="12" fill="#546e7a">Planned (off today)</text>
</svg>
